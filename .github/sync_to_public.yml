name: Sync to Public Repo

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: Clone public repo
        run: |
          git clone https://${{ secrets.GH_TOKEN }}@github.com/kanazawahere/discord-ai-community-public.git public_repo
          cd public_repo
          git checkout main || git checkout -b main

      - name: Copy only public files
        run: |
          cd public_repo
          
          # Clean old content
          rm -rf .github scripts docs README.md PROJECT_STATE.md ANNOUNCEMENTS.md .gitignore 2>/dev/null || true
          
          # Copy ONLY public files from private
          mkdir -p .github/workflows
          cp -r ../.github/workflows/. .github/
          cp -r ../scripts .
          cp -r ../docs .
          cp ../README.md .
          cp ../PROJECT_STATE.md .
          cp ../ANNOUNCEMENTS.md .
          cp ../.gitignore .

      - name: Commit and push
        run: |
          cd public_repo
          git add -A
          git diff --cached --quiet && echo "No changes to sync" && exit 0
          git commit -m "Sync from private - $(date '+%Y-%m-%d %H:%M')" || exit 0
          git push https://${{ secrets.GH_TOKEN }}@github.com/kanazawahere/discord-ai-community-public.git main